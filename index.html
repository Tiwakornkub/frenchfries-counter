<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sale Counter - 30 Days Pro</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f8f9fa;
            margin: 0;
            padding: 20px;
            touch-action: manipulation;
        }
        h1 { color: #333; margin-bottom: 20px; font-size: 24px; }
        .container {
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 800px;
            justify-content: space-around;
        }
        .counter-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }
        .btn {
            width: 100%;
            aspect-ratio: 1 / 1;
            font-size: 70px; 
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.95); }
        .btn-s { background-color: #4CAF50; }
        .btn-m { background-color: #FF9800; }
        .btn-l { background-color: #F44336; }
        
        .count-display {
            font-size: 45px;
            font-weight: bold;
            margin-top: 10px;
            color: #333;
        }

        .minus-btn {
            margin-top: 10px;
            width: 60px;
            height: 40px;
            background-color: #dee2e6;
            color: #495057;
            border: none;
            border-radius: 10px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .summary-box {
            margin-top: 25px;
            padding: 15px;
            background-color: #fff;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .summary-label { font-size: 18px; font-weight: bold; color: #555; }
        .revenue-text { font-size: 24px; font-weight: bold; color: #2196F3; }
        
        .expense-input {
            font-size: 20px;
            padding: 8px;
            width: 110px;
            text-align: right;
            border: 2px solid #ccc;
            border-radius: 8px;
            font-weight: bold;
            color: #ff9800;
        }

        .profit-text { font-size: 28px; font-weight: bold; color: #4CAF50; }
        .profit-negative { color: #F44336; }

        .reset-btn {
            margin-top: 20px;
            padding: 15px;
            font-size: 18px;
            background-color: #343a40;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            width: 90%;
            max-width: 500px;
            font-weight: bold;
        }

        /* ส่วนประวัติ 30 วัน */
        .history-box {
            margin-top: 25px;
            padding: 15px;
            background-color: #fff;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
        }
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        .history-scroll {
            max-height: 300px; /* จำกัดความสูงตาราง */
            overflow-y: auto; /* เลื่อนขึ้นลงได้ */
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: center; border-bottom: 1px solid #eee; font-size: 16px; }
        .total-30-days {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 2px dashed #eee;
            text-align: right;
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>

    <h1>ระบบนับยอดขาย</h1>

    <div class="container">
        <div class="counter-box">
            <button class="btn btn-s" onclick="addSale('S')">S</button>
            <div class="count-display" id="count-S">0</div>
            <button class="minus-btn" onclick="subtractSale('S')">-</button>
        </div>
        <div class="counter-box">
            <button class="btn btn-m" onclick="addSale('M')">M</button>
            <div class="count-display" id="count-M">0</div>
            <button class="minus-btn" onclick="subtractSale('M')">-</button>
        </div>
        <div class="counter-box">
            <button class="btn btn-l" onclick="addSale('L')">L</button>
            <div class="count-display" id="count-L">0</div>
            <button class="minus-btn" onclick="subtractSale('L')">-</button>
        </div>
    </div>

    <div class="summary-box">
        <div class="summary-row">
            <span class="summary-label">รายรับ:</span>
            <div><span class="revenue-text" id="total-revenue">0</span> ฿</div>
        </div>
        <div class="summary-row">
            <span class="summary-label">ต้นทุน:</span>
            <input type="number" class="expense-input" id="expense-input" placeholder="0" oninput="calculateProfit()">
        </div>
        <div class="summary-row">
            <span class="summary-label">กำไรสุทธิ:</span>
            <div><span class="profit-text" id="net-profit">0</span> ฿</div>
        </div>
    </div>

    <button class="reset-btn" onclick="resetCounts()">สรุปยอดและเริ่มวันใหม่</button>

    <div class="history-box">
        <div class="history-header">
            <span style="font-weight:bold; color:#555;">ประวัติ 30 วันล่าสุด</span>
            <button onclick="clearHistory()" style="font-size:12px; color:red; border:none; background:none;">ล้างประวัติทั้งหมด</button>
        </div>
        <div class="history-scroll">
            <table>
                <thead>
                    <tr style="background:#f9f9f9;">
                        <th style="text-align: left;">วันที่</th>
                        <th style="text-align: right;">กำไร (฿)</th>
                    </tr>
                </thead>
                <tbody id="history-body"></tbody>
            </table>
        </div>
        <div class="total-30-days">
            กำไรสะสมในตาราง: <span id="accumulated-profit" style="color:#2196F3;">0</span> ฿
        </div>
    </div>

    <script>
        let counts = { 'S': 0, 'M': 0, 'L': 0 };
        const prices = { 'S': 39, 'M': 49, 'L': 59 };

        window.onload = function() {
            try {
                ['S', 'M', 'L'].forEach(size => {
                    counts[size] = parseInt(localStorage.getItem('sale_' + size)) || 0;
                    document.getElementById('count-' + size).innerText = counts[size];
                });
                document.getElementById('expense-input').value = localStorage.getItem('daily_expense') || "";
                calculateProfit(); 
                renderHistory();
            } catch(e) {}
        };

        function addSale(size) {
            counts[size]++; 
            updateDisplay(size);
        }

        function subtractSale(size) {
            if (counts[size] > 0) {
                counts[size]--;
                updateDisplay(size);
            }
        }

        function updateDisplay(size) {
            document.getElementById('count-' + size).innerText = counts[size];
            calculateProfit();
            try { localStorage.setItem('sale_' + size, counts[size]); } catch(e) {}
        }

        function calculateProfit() {
            let revenue = (counts['S'] * prices['S']) + (counts['M'] * prices['M']) + (counts['L'] * prices['L']);
            document.getElementById('total-revenue').innerText = revenue.toLocaleString('th-TH');

            let expense = parseInt(document.getElementById('expense-input').value) || 0;
            try { localStorage.setItem('daily_expense', document.getElementById('expense-input').value); } catch(e) {}

            let profit = revenue - expense;
            let display = document.getElementById('net-profit');
            display.innerText = profit.toLocaleString('th-TH');
            display.className = profit < 0 ? 'profit-text profit-negative' : 'profit-text';
            return profit;
        }

        function renderHistory() {
            let history = JSON.parse(localStorage.getItem('profit_history')) || [];
            let tbody = document.getElementById('history-body');
            let accumulatedDisplay = document.getElementById('accumulated-profit');
            
            tbody.innerHTML = history.length ? '' : '<tr><td colspan="2" style="color:#999; padding:20px;">ยังไม่มีข้อมูลบันทึก</td></tr>';
            
            let totalAccumulated = 0;
            history.forEach(record => {
                totalAccumulated += record.profit;
                tbody.innerHTML += `<tr><td style="text-align:left;">${record.date}</td><td style="text-align:right; font-weight:bold; color:${record.profit >= 0 ? '#4CAF50' : '#F44336'}">${record.profit.toLocaleString()}</td></tr>`;
            });

            accumulatedDisplay.innerText = totalAccumulated.toLocaleString('th-TH');
        }

        function resetCounts() {
            let profit = calculateProfit();
            if(confirm('สรุปยอดวันนี้และเริ่มวันใหม่?')) {
                let history = JSON.parse(localStorage.getItem('profit_history')) || [];
                let today = new Date();
                let dateStr = today.toLocaleDateString('th-TH', { day: 'numeric', month: 'short' });
                
                // ถ้าเป็นวันเดียวกัน ให้บวกยอดทับไป (กรณีเผลอกดจบวันหลายรอบ)
                if (history.length > 0 && history[0].date === dateStr) {
                    history[0].profit = profit;
                } else {
                    history.unshift({ date: dateStr, profit: profit });
                }

                // เก็บประวัติสูงสุด 30 วัน
                if (history.length > 30) history.pop();
                
                localStorage.setItem('profit_history', JSON.stringify(history));

                ['S', 'M', 'L'].forEach(size => {
                    counts[size] = 0;
                    updateDisplay(size);
                });
                document.getElementById('expense-input').value = "";
                localStorage.setItem('daily_expense', "");
                renderHistory();
                window.scrollTo(0,0); // เลื่อนกลับไปด้านบน
            }
        }

        function clearHistory() {
            if(confirm('คุณแน่ใจหรือไม่ว่าต้องการลบประวัติ 30 วันทั้งหมด?')) {
                localStorage.removeItem('profit_history');
                renderHistory();
            }
        }
    </script>
</body>
</html>
