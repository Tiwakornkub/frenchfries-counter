<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sale Counter & Profit</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f8f9fa;
            margin: 0;
            padding: 20px;
            touch-action: manipulation;
        }
        h1 { color: #333; margin-bottom: 25px; }
        .container {
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 800px;
            justify-content: space-around;
        }
        .counter-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }
        .btn {
            width: 100%;
            aspect-ratio: 1 / 1;
            font-size: 70px; /* ขยายตัวอักษร S M L ให้ใหญ่ขึ้นนิดนึงเมื่อไม่มีราคา */
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.95); }
        
        .btn-s { background-color: #4CAF50; }
        .btn-m { background-color: #FF9800; }
        .btn-l { background-color: #F44336; }
        
        .count-display {
            font-size: 40px;
            font-weight: bold;
            margin-top: 15px;
            color: #333;
        }
        
        /* กล่องสรุปยอด */
        .summary-box {
            margin-top: 35px;
            padding: 20px;
            background-color: #fff;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .summary-row:last-child {
            border-bottom: none; margin-bottom: 0; padding-bottom: 0;
        }
        .summary-label {
            font-size: 22px;
            font-weight: bold;
            color: #555;
        }
        .revenue-text { font-size: 28px; font-weight: bold; color: #2196F3; }
        
        /* ช่องกรอกรายจ่าย */
        .expense-input {
            font-size: 24px;
            padding: 10px;
            width: 130px;
            text-align: right;
            border: 2px solid #ccc;
            border-radius: 8px;
            font-weight: bold;
            color: #ff9800;
        }
        .expense-input:focus { outline: none; border-color: #ff9800; }

        .profit-text { font-size: 36px; font-weight: bold; color: #4CAF50; transition: color 0.3s;}
        .profit-negative { color: #F44336; }

        .reset-btn {
            margin-top: 35px;
            padding: 15px 40px;
            font-size: 20px;
            background-color: #555;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>ระบบนับยอดขาย</h1>

    <div class="container">
        <div class="counter-box">
            <button class="btn btn-s" onclick="addSale('S')">S</button>
            <div class="count-display" id="count-S">0</div>
        </div>
        <div class="counter-box">
            <button class="btn btn-m" onclick="addSale('M')">M</button>
            <div class="count-display" id="count-M">0</div>
        </div>
        <div class="counter-box">
            <button class="btn btn-l" onclick="addSale('L')">L</button>
            <div class="count-display" id="count-L">0</div>
        </div>
    </div>

    <div class="summary-box">
        <div class="summary-row">
            <span class="summary-label">รายรับ:</span>
            <div><span class="revenue-text" id="total-revenue">0</span><span style="font-size:18px; color:#666;"> ฿</span></div>
        </div>
        <div class="summary-row">
            <span class="summary-label">รายจ่าย (ต้นทุน):</span>
            <div>
                <input type="number" class="expense-input" id="expense-input" placeholder="0" oninput="calculateProfit()">
            </div>
        </div>
        <div class="summary-row">
            <span class="summary-label">กำไรสุทธิ:</span>
            <div><span class="profit-text" id="net-profit">0</span><span style="font-size:18px; color:#666;"> ฿</span></div>
        </div>
    </div>

    <button class="reset-btn" onclick="resetCounts()">เริ่มวันใหม่ (รีเซ็ตทั้งหมด)</button>

    <script>
        let counts = { 'S': 0, 'M': 0, 'L': 0 };
        const prices = { 'S': 39, 'M': 49, 'L': 59 };

        window.onload = function() {
            try {
                ['S', 'M', 'L'].forEach(size => {
                    counts[size] = parseInt(localStorage.getItem('sale_' + size)) || 0;
                    document.getElementById('count-' + size).innerText = counts[size];
                });
                
                let savedExpense = localStorage.getItem('daily_expense') || "";
                document.getElementById('expense-input').value = savedExpense;

                calculateProfit(); 
            } catch(e) {
                console.warn("ไม่สามารถดึงข้อมูลที่บันทึกไว้ได้");
            }
        };

        function addSale(size) {
            counts[size]++; 
            document.getElementById('count-' + size).innerText = counts[size]; 
            calculateProfit(); 

            try {
                localStorage.setItem('sale_' + size, counts[size]);
            } catch(e) {}
        }

        function calculateProfit() {
            let revenue = (counts['S'] * prices['S']) + (counts['M'] * prices['M']) + (counts['L'] * prices['L']);
            document.getElementById('total-revenue').innerText = revenue.toLocaleString('th-TH');

            let expenseInput = document.getElementById('expense-input').value;
            let expense = parseInt(expenseInput) || 0;

            try { localStorage.setItem('daily_expense', expenseInput); } catch(e) {}

            let profit = revenue - expense;
            let profitDisplay = document.getElementById('net-profit');
            
            profitDisplay.innerText = profit.toLocaleString('th-TH');

            if (profit < 0) {
                profitDisplay.classList.add('profit-negative'); 
            } else {
                profitDisplay.classList.remove('profit-negative'); 
            }
        }

        function resetCounts() {
            if(confirm('ต้องการเริ่มวันใหม่ รีเซ็ตยอดขายและรายจ่ายทั้งหมดเป็น 0 ใช่หรือไม่?')) {
                ['S', 'M', 'L'].forEach(size => {
                    counts[size] = 0;
                    document.getElementById('count-' + size).innerText = 0;
                    try { localStorage.setItem('sale_' + size, 0); } catch(e) {}
                });
                
                document.getElementById('expense-input').value = "";
                try { localStorage.setItem('daily_expense', ""); } catch(e) {}

                calculateProfit(); 
            }
        }
    </script>
</body>
</html>
