<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sale Counter</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f8f9fa;
            margin: 0;
            padding: 20px;
            touch-action: manipulation;
        }
        h1 { color: #333; margin-bottom: 30px; }
        .container {
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 800px;
            justify-content: space-around;
        }
        .counter-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }
        .btn {
            width: 100%;
            aspect-ratio: 1 / 1;
            font-size: 50px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.95); }
        
        .btn-s { background-color: #4CAF50; }
        .btn-m { background-color: #FF9800; }
        .btn-l { background-color: #F44336; }
        
        .count-display {
            font-size: 40px;
            font-weight: bold;
            margin-top: 15px;
            color: #333;
        }
        
        /* ส่วนที่เพิ่มมาใหม่สำหรับแสดงยอดเงิน */
        .total-box {
            margin-top: 40px;
            padding: 20px 40px;
            background-color: #fff;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 80%;
            max-width: 400px;
        }
        .total-title {
            font-size: 20px;
            color: #666;
            margin-bottom: 10px;
        }
        .total-amount {
            font-size: 45px;
            font-weight: bold;
            color: #2196F3; /* สีฟ้า */
        }
        .baht-text {
            font-size: 24px;
            color: #666;
        }

        .reset-btn {
            margin-top: 40px;
            padding: 15px 40px;
            font-size: 20px;
            background-color: #555;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>ระบบนับยอดขาย</h1>

    <div class="container">
        <div class="counter-box">
            <button class="btn btn-s" onclick="addSale('S')">S<br><span style="font-size: 20px;">39฿</span></button>
            <div class="count-display" id="count-S">0</div>
        </div>
        <div class="counter-box">
            <button class="btn btn-m" onclick="addSale('M')">M<br><span style="font-size: 20px;">49฿</span></button>
            <div class="count-display" id="count-M">0</div>
        </div>
        <div class="counter-box">
            <button class="btn btn-l" onclick="addSale('L')">L<br><span style="font-size: 20px;">59฿</span></button>
            <div class="count-display" id="count-L">0</div>
        </div>
    </div>

    <div class="total-box">
        <div class="total-title">รายรับวันนี้</div>
        <div>
            <span class="total-amount" id="total-revenue">0</span>
            <span class="baht-text"> บาท</span>
        </div>
    </div>

    <button class="reset-btn" onclick="resetCounts()">รีเซ็ตยอดรายวัน</button>

    <script>
        let counts = { 'S': 0, 'M': 0, 'L': 0 };
        const prices = { 'S': 39, 'M': 49, 'L': 59 }; // ราคาของแต่ละไซส์

        window.onload = function() {
            try {
                ['S', 'M', 'L'].forEach(size => {
                    counts[size] = parseInt(localStorage.getItem('sale_' + size)) || 0;
                    document.getElementById('count-' + size).innerText = counts[size];
                });
                updateTotal(); // คำนวณยอดเงินตอนเปิดแอป
            } catch(e) {
                console.warn("ไม่สามารถดึงข้อมูลที่บันทึกไว้ได้");
            }
        };

        function addSale(size) {
            counts[size]++; 
            document.getElementById('count-' + size).innerText = counts[size]; 
            updateTotal(); // อัปเดตยอดเงินทุกครั้งที่กด

            try {
                localStorage.setItem('sale_' + size, counts[size]);
            } catch(e) {}
        }

        // ฟังก์ชันคำนวณยอดเงินรวม
        function updateTotal() {
            let total = (counts['S'] * prices['S']) + (counts['M'] * prices['M']) + (counts['L'] * prices['L']);
            // ใส่ลูกน้ำ (comma) ให้ตัวเลขดูง่ายขึ้น
            document.getElementById('total-revenue').innerText = total.toLocaleString('th-TH');
        }

        function resetCounts() {
            if(confirm('ต้องการรีเซ็ตยอดขายทั้งหมดเป็น 0 ใช่หรือไม่?')) {
                ['S', 'M', 'L'].forEach(size => {
                    counts[size] = 0;
                    document.getElementById('count-' + size).innerText = 0;
                    try {
                        localStorage.setItem('sale_' + size, 0);
                    } catch(e) {}
                });
                updateTotal(); // รีเซ็ตยอดเงินเป็น 0
            }
        }
    </script>
</body>
</html>
